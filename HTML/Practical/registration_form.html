<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
</head>

<body>

    <h1>Job Application Form</h1>
    <p>Please fill in your details to apply for the job.</p>

    <form action="#" method="post">

        <!-- Full Name -->
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>

        <br><br>

        <!-- Email -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <br><br>

        <!-- Phone -->
        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

        <br><br>

        <!-- Position -->
        <label for="position">Position Applied For:</label><br>
        <select id="position" name="position" required>
            <option value="">-- Select Position --</option>
            <option>Frontend Developer</option>
            <option>Backend Developer</option>
            <option>UI/UX Designer</option>
            <option>Software Tester</option>
        </select>

        <br><br>

        <!-- Experience -->
        <label for="experience">Experience:</label><br>
        <select id="experience" name="experience">
            <option value="">-- Select Experience --</option>
            <option>Fresher</option>
            <option>0-1 Year</option>
            <option>1-3 Years</option>
            <option>3+ Years</option>
        </select>

        <br><br>

        <!-- Skills -->
        <p>Skills:</p>

        <input type="checkbox" id="html" name="skills" value="HTML">
        <label for="html">HTML</label>

        <input type="checkbox" id="css" name="skills" value="CSS">
        <label for="css">CSS</label>

        <input type="checkbox" id="js" name="skills" value="JavaScript">
        <label for="js">JavaScript</label>

        <input type="checkbox" id="react" name="skills" value="React">
        <label for="react">React</label>

        <br><br>

        <!-- Resume -->
        <label for="resume">Upload Resume:</label><br>
        <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx">

        <br><br>

        <!-- About Yourself -->
        <label for="about">About Yourself:</label><br>
        <textarea id="about" name="about" rows="5" cols="40" placeholder="Write a short introduction..."></textarea>

        <br><br>

        <!-- Buttons -->
        <button type="submit">Apply Now</button>
        <button type="reset">Reset</button>

    </form>

</body>

</html>
